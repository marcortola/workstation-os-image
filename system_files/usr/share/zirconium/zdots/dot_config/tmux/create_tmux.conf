# Workstation tmux configuration.
# Ported from Omarchy (basecamp/omarchy) and retuned to Tokyo Night for the
# Fish + Foot workstation image. Managed as a chezmoi create-only seed; see
# config/dotfiles.manifest and dot_config/tmux/create_tmux.conf in the image.

# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# Config and help
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"

# Vi mode for copy, with Wayland clipboard integration
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

# Pane Controls
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
bind -n M-Escape kill-pane

bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1
bind C-p previous-window
bind C-n next-window
bind Space last-window

# Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# General
set -g default-shell /usr/bin/fish
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off
set -g extended-keys on
set -g extended-keys-format csi-u
set -ag terminal-features "xterm-256color:extkeys"
set -sg escape-time 10
set -g display-time 4000

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on
set -g set-titles-string '#h:#W'

# Theme (Tokyo Night)
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[bg=default] "
set -g status-right "#[fg=#7aa2f7]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#414868]#h "
set -g window-status-format "#[fg=#414868] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=default,fg=#7aa2f7"
set -g message-command-style "bg=default,fg=#7aa2f7"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
setw -g clock-mode-colour "#7aa2f7"

# ── Cheatsheet popup (prefix + ?) ───────────────────────────────────────────
# Overrides tmux's default prefix-? (list-keys). Runs under /bin/sh, never fish.
bind ? display-popup -w 56 -h 90% -E -b rounded \
  -S "fg=#7aa2f7,bg=#1a1b26" -s "fg=#c0caf5,bg=#1a1b26" \
  -T "#[fg=#bb9af7,bold] tmux cheatsheet " \
  'sh -c '"'"'
  m="\033[38;2;187;154;247m"; f="\033[38;2;192;202;245m"
  c="\033[38;2;86;95;137m";  g="\033[38;2;158;206;106m"; r="\033[0m"
  printf "%b" "
  ${m}SESSIONS & WINDOWS${r}
    ${f}prefix C${r}     ${c}new session${r}
    ${f}prefix s${r}     ${c}list / switch sessions${r}
    ${f}prefix c${r}     ${c}new window${r}
    ${f}prefix r${r}     ${c}rename window${r}
    ${f}prefix k${r}     ${c}kill window${r}

  ${m}PANES${r}
    ${f}prefix h${r}     ${c}split below${r}
    ${f}prefix v${r}     ${c}split right${r}
    ${f}C-M-Arrows${r}   ${c}navigate panes${r}
    ${f}prefix z${r}     ${c}zoom / unzoom${r}
    ${f}prefix x${r}     ${c}close pane${r}

  ${m}QUICK NAV${r}
    ${f}M-1 .. M-9${r}   ${c}select window 1-9${r}
    ${f}M-Left/Right${r} ${c}prev / next window${r}
    ${f}M-Up/Down${r}    ${c}prev / next session${r}

  ${m}OTHER${r}
    ${f}prefix [${r}     ${c}copy mode  (y = copy)${r}
    ${f}prefix d${r}     ${c}detach${r}
    ${f}prefix q${r}     ${c}reload config${r}
    ${f}prefix ?${r}     ${c}this help${r}

  ${g}prefix = C-Space  (also C-b)${r}   ${c}any key to close${r}
"
  read -rsn1 _
  '"'"''
