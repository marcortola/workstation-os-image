# workmux global configuration
# Applies to every repository. Override per project in a repo's .workmux.yaml
# (use "<global>" inside a list to inherit these values alongside project ones).
# Full annotated reference: `workmux config reference`.

# AI agent launched wherever "<agent>" appears in the pane layout below.
# Change to `codex` or `opencode`, or override with `workmux add --agent <cmd>`.
agent: claude

# `workmux merge` squashes by default, matching the PR-based squash-merge flow
# the worktree-push command uses. The --rebase / --merge CLI flags override.
merge_strategy: squash

# Pane layout for each worktree window: agent | editor | shell.
#   left  : the AI agent (focused)
#   right : editor on top, a plain shell (12 rows) beneath it
panes:
  - command: "<agent>"
    focus: true
  - command: nvim
    split: horizontal
  - split: vertical
    size: 12

# Populate each new worktree with the untracked files declared in the repo's
# committed .worktreeinclude (env files, .idea, etc.) — the same inventory the
# Claude Code and JetBrains flows read, so every path stays in sync from one
# list. `workstation-worktree-sync` is a no-op when the tool or a
# .worktreeinclude is absent, so it never blocks worktree creation.
#
# A per-project .workmux.yaml that sets its own post_create must include
# "<global>" to keep this step, e.g. add `npm ci` or a node_modules symlink
# alongside it there (language installs/symlinks do not belong in this file).
post_create:
  - workstation-worktree-sync
