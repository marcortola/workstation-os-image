# Read by Obsidian's Flatpak launcher (obsidian.sh) through
# OBSIDIAN_USER_ARGS_FILE; each non-comment token is appended to the Electron
# command line. The launcher already enables the Wayland backend and IME
# automatically on a Wayland session, so --enable-wayland-ime is belt-and-
# suspenders; --disable-gpu turns off GPU acceleration (drop it if Obsidian
# renders fine without it).
--disable-gpu
--enable-wayland-ime
