# Put Homebrew binaries on the graphical (systemd --user) session PATH so
# GUI-launched apps inherit them. Niri runs as niri.service under the systemd
# user manager, so every app it spawns (JetBrains Toolbox and the IDEs it
# launches, etc.) inherits this environment. Without it those apps only see
# the base session PATH and cannot find brew tools such as node -- which is
# why WebStorm reports "Node.js is required" despite node being installed.
#
# This mirrors `brew shellenv` (prepend), which the interactive fish shell
# already applies via zdots create_config.fish; here it extends the same
# precedence to the GUI session. Complements the base image's
# 30-brew-proxy.conf, which sets XDG_DATA_DIRS but not PATH.
#
# Takes effect on the next login (systemd --user re-reads environment.d).
PATH=/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:$PATH
