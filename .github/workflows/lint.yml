name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Lint the Containerfile
        run: |
          docker run --rm -v "$PWD":/repo:ro -w /repo \
            ghcr.io/hadolint/hadolint:v2.14.0 \
            hadolint --config .hadolint.yaml Containerfile

      - name: Lint GitHub Actions workflows
        run: |
          docker run --rm -v "$PWD":/repo:ro -w /repo \
            rhysd/actionlint:1.7.12 -color

      - name: Scan for committed secrets
        run: |
          docker run --rm -v "$PWD":/repo:ro -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 dir . --no-banner --redact
